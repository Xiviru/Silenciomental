name: Publicación Diaria Instagram

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias de Python
        run: |
          pip install playwright instagrapi
          playwright install chromium

      - name: Ejecutar automatización
        env:
          INSTA_USERNAME: ${{ secrets.INSTA_USERNAME }}
          INSTA_PASSWORD: ${{ secrets.INSTA_PASSWORD }}
        run: python automate_insta.py

      - name: Guardar sesión de Instagram (Cache)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: insta-session
          path: session.json
          retention-days: 7
